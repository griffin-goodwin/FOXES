# =============================================================================
# FOXES Training Configuration
# =============================================================================
# Used by train.py to train the ViTLocal model on paired AIA/SXR .npy data.
# Expects aia_dir/sxr_dir to each have train/val/test subfolders (that's what
# data/build_dataset.py produces).
#
# Usage:
#   python training/train.py --config training/train_config.yaml
# =============================================================================
wavelengths: [94, 131, 171, 193, 211, 304, 335]

# GPU configuration:
#   0 (or any int)  - that single GPU
#   [0, 1]          - those specific GPUs
#   "all"           - every available GPU
#   -1              - CPU only
gpu_ids: -1

batch_size: 6
epochs: 250

# Compute inverse-frequency loss weights (quiet/C/M/X) from the training data
# before starting. Takes one extra pass over the training set.
calculate_base_weights: false

vit_architecture:
  embed_dim: 256
  num_channels: 7
  num_classes: 1
  patch_size: 8
  num_patches: 4096
  hidden_dim: 1024
  num_heads: 8
  num_layers: 8
  dropout: 0.1
  learning_rate: 0.0001
  # Self-attention masking - one of:
  #   inverted - the released model's behavior: each patch attends to DISTANT
  #              patches (the flipped local-attention mask it was trained with)
  #   local    - true local attention: each patch attends to its neighborhood
  #   none     - standard full/global attention (no masking)
  mask_mode: inverted
  local_window: 9   # neighbourhood side length (patches), used by inverted/local

optimizer:
  weight_decay: 0.00001   # AdamW weight decay
  scheduler:              # CosineAnnealingWarmRestarts
    T_0: 250
    T_mult: 2
    eta_min: 0.0000001

loss:
  huber_delta: 0.3          # delta for the underlying Huber loss
  window_size: 15000        # rolling error-history length per flare class
  diagnostic_every_n_steps: 200   # how often to log per-class adaptive weights

  # Note: quiet/C/M/X flux boundaries (1e-6/1e-5/1e-4 W/m^2) are the fixed GOES
  # flare-class definition, not configurable here — see
  # SXRRegressionDynamicLoss.CLASS_THRESHOLDS in forecasting/model.py.

  # Static per-class weight (multiplied by the adaptive multiplier below).
  # Only used when calculate_base_weights: false. Leave null to fall back to
  # SXRRegressionDynamicLoss's defaults, which were fit to the ORIGINALLY
  # RELEASED dataset — set calculate_base_weights: true instead if training on
  # your own data, or fill these in with weights fit to it.
  base_weights: null
  # base_weights:
  #   quiet: 6.64
  #   c_class: 1.63
  #   m_class: 4.72
  #   x_class: 43.13

  # Advanced: per-class {max_multiplier, min_multiplier, sensitivity,
  # min_samples, recent_window} controlling how far recent performance can
  # move a class's weight from its base_weight. Leave null to use
  # SXRRegressionDynamicLoss.DEFAULT_ADAPTIVE_MULTIPLIERS.
  adaptive_multipliers: null

checkpoint:
  monitor: val_total_loss
  mode: min
  save_top_k: 10   # how many best checkpoints to keep on disk

logging:
  log_every_n_steps: 10   # Trainer step-logging interval

callbacks:
  sxr_plot_num_samples: 4          # validation samples shown in the pred-vs-true SXR plot
  attention_num_samples: 4         # validation samples visualized per attention-map epoch
  attention_log_every_n_epochs: 1  # how often (in epochs) to log attention maps

data:
  aia_dir: "./foxes_data/AIA_processed"
  sxr_dir: "./foxes_data/SXR_processed"
  sxr_norm_path: "./foxes_data/normalized_sxr.npy"
  checkpoints_dir: "./foxes_data/chkpt/"  # update to actual checkpoint
  num_workers: 8   # DataLoader worker processes; defaults to min(8, cpu_count()) if omitted

wandb:
  entity: "ggoodwin5-georgia-state-university"  # your W&B username or team name
  project: FOXES
  job_type: training
  tags:
    - aia
    - sxr
    - regression
  run_name: run_1
  notes: AIA to SXR translation
