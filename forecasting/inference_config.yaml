# =============================================================================
# FOXES Inference Configuration
# =============================================================================
# Used by inference.py to run a trained ViTLocal checkpoint over a folder of
# AIA data and write out SXR predictions (+ optional attention/flux maps).
#
# Usage:
#   python forecasting/inference.py --config forecasting/inference_config.yaml
# =============================================================================

wavelengths: [94, 131, 171, 193, 211, 304, 335]

# Set to "true" if you only have AIA images and no ground-truth SXR to compare
# against (e.g. running on new/live data). When true, data.sxr_dir is ignored.
prediction_only: "false"

data:
  # Point these directly at the folder of .npy files you want to run the model
  # on — no special subfolder naming (e.g. "test/") is required or assumed.
  # Defaults below point at the test split data/build_dataset.py produces.
  aia_dir:         "./foxes_data/AIA_processed/test"   # ignored if prediction_only: "true"
  sxr_dir:         "./foxes_data/SXR_processed/test"   # ignored if prediction_only: "true"
  sxr_norm_path:   "./trained_weights_and_normalization/normalized_sxr.npy"
  checkpoint_path: "./trained_weights_and_normalization/inverted-attention-mask.ckpt"

output_path: "./foxes_data/inference/predictions.csv"

# Per-sample attention weights (64x64 CSV per timestamp). Set model_params.no_weights: true to skip.
weight_path: "./foxes_data/inference/weights/"

# Per-patch flux contribution maps (64x64 CSV per timestamp) — saved automatically
# during inference whenever flux_path is set and model_params.no_flux is false (default).
flux_path:   "./foxes_data/inference/flux/"

model_params:
  input_size: 512
  patch_size: 8
  batch_size: 10
  no_weights: false   # true = skip saving attention weights (saves ~3GB/batch of GPU memory)
  no_flux:    false   # true = skip saving flux contribution maps

num_workers: 8    # set to 0 to disable multiprocessing (useful for debugging stalls)
pin_memory:  true
use_amp:     false  # set true to enable FP16 autocast (faster on A100, may OOM on V100)
multi_gpu:   false  # set true to use all available GPUs via DataParallel
